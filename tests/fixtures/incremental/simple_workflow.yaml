name: fixture_incremental_demo
params: {}
tasks:
  - name: normalize_source_records
    type: custom
    config: dummy.yaml
    incremental:
      strategy: key_upsert
      sources: [source_records]
    grain:
      type: key
      primary_key: [partition_date, group_id, entity_id]

  - name: update_entity_state
    type: custom
    config: dummy.yaml
    depends_on: [normalize_source_records]
    incremental:
      strategy: entity_state_update
      change_propagation:
        - upstream: normalize_source_records
          propagation_mode: entity
          key_mapping:
            entity_id: entity_id
    grain:
      type: entity
      entity_keys: [entity_id]

  - name: refresh_partition_slice
    type: custom
    config: dummy.yaml
    depends_on: [normalize_source_records]
    incremental:
      strategy: partition_replace
      change_propagation:
        - upstream: normalize_source_records
          propagation_mode: partition
          key_mapping:
            partition_date: partition_date
    grain:
      type: partition
      partition_by: [partition_date]
